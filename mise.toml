[settings]
experimental = true
python.uv_venv_auto = true

[env]
GITHUB_REPO_OWNER = "hotdog-werx"
GITHUB_REPO_NAME = "{{ config_root | basename }}"
GITHUB_REPO = "{{ env.GITHUB_REPO_OWNER }}/{{ env.GITHUB_REPO_NAME }}"
GIT_CLIFF_CONFIG = "./cliff.toml"

[tools]
uv = "0.11.26"
dprint = "0.55.1"
starship = "1.26.0"
git-cliff = "2.13.1"
actionlint = "1.7.11"
shellcheck = "0.11.0"

"pipx:uv-toolbox" = "0.1.0"
"pipx:ruff" = "0.14.14"
"pipx:ty" = "latest"
"pipx:complexipy" = "4.0.2"
"pipx:pydoclint" = "latest"
"pipx:zensical" = "0.0.19"
"pipx:hotdog-werx/releez" = "0.2.0"

[hooks]
postinstall = ["mise run setup-hook"]

# --- devkit-workspace tasks ---
[tasks]
format-dprint.run = "dprint fmt"
check-dprint.run = "dprint check"
check-actionlint.run = "actionlint"
check-repolish.run = "repolish apply --check"
dev-docs.run = "zensical serve --dev-addr=127.0.0.1:8000"
build-docs.run = "zensical build --clean"
clean-docs.run = "rm -rf site/"

# --- devkit-python tasks ---
# Format down to 80 cols where it fits; ruff's formatter adds a magic
# trailing comma to anything it explodes across lines, and skip-magic-
# trailing-comma=false means that comma then forces the construct to stay
# exploded even once the width limit widens back out to the real 119-col
# config on the second pass. ruff check --fix applies COM812 (add missing
# trailing commas) to anything the formatter didn't already touch.
format-python.run = """
ruff format --config ruff.toml --line-length=80 .
ruff check --config ruff.toml --fix --fix-only .
ruff format --config ruff.toml .
"""
check-python.run = """
ruff check --config ruff.toml .
ruff format --config ruff.toml --check .
"""
check-format.run = "ruff format --check --config ruff.toml ."
check-ty.run = "ty check ."
check-complexity.run = "complexipy -mx 10 ."
check-pydoclint.run = "pydoclint --style=google --config=pydoclint.toml ."
check-coverage.run = "pytest -v --tb=short --cov-config=coveragerc.toml --cov=devkit --cov-report=term-missing --cov-report=html:.coverage-files/htmlcov"

# --- devkit-releez tasks ---
regen-changelog.run = "mise exec -- releez changelog regenerate"

[tasks.format]
depends = ["format-python", "format-dprint"]

[tasks.setup]
depends = ["uv-sync", "pnpm-install"]
run = "echo Ready!"

[tasks.ci-checks]
depends = [
  "check-dprint",
  "check-python",
  "check-format",
  "check-ty",
  "check-complexity",
  "check-pydoclint",
  "check-coverage",
  "check-actionlint",
]

[tasks.repo-checks]
depends = ["check-dprint", "check-actionlint", "check-repolish"]
