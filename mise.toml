[settings]
experimental = true
python.uv_venv_auto = true

[env]
GITHUB_REPO_OWNER = "hotdog-werx"
GITHUB_REPO_NAME = "{{ config_root | basename }}"
GITHUB_REPO = "{{ env.GITHUB_REPO_OWNER }}/{{ env.GITHUB_REPO_NAME }}"
GIT_CLIFF_CONFIG = "./cliff.toml"

[tools]
uv = "0.11.26"
dprint = "0.55.1"
starship = "1.26.0"
git-cliff = "2.13.1"
actionlint = "1.7.11"
shellcheck = "0.11.0"

"pipx:uv-toolbox" = "0.1.0"
"pipx:ruff" = "0.14.14"
"pipx:ty" = "latest"
"pipx:complexipy" = "4.0.2"
"pipx:pydoclint" = "latest"
"pipx:zensical" = "0.0.19"
"pipx:releez" = "1.0.1"

# repolish lives only in the uv-toolbox-managed "repolish" env (not devkit's
# own .venv, not a mise-managed tool) — uv-toolbox install provisions it
# before repolish link can use it. repolish link then materializes
# provider-resource symlinks (.editorconfig, dprint.json) — these are never
# committed to git (their symlink source is an absolute path, portable only
# within the machine that created it), so every environment links them
# fresh on every `mise install`.
#
# [[hooks.postinstall]] (array-of-tables, one entry per subprocess) is used
# instead of a flat postinstall = ["...", "..."] array — newer mise releases
# (2026.7.5 in CI, not 2026.5.15 locally) silently ran only the last entry
# of the flat-array form.
[[hooks.postinstall]]
run = "uv-toolbox install"

[[hooks.postinstall]]
run = "uv-toolbox exec --env repolish -- repolish link"

[[hooks.postinstall]]
run = "mise run workspace:setup-hook"

# --- devkit-workspace tasks ---
[tasks."workspace:dprint:format"]
usage = '''
arg "[files]" var=#true default="." help="Files to format (defaults to the whole tree; lefthook passes staged files here)"
'''
run = "dprint fmt ${usage_files}"

[tasks."workspace:dprint:check"]
run = "dprint check"

[tasks."workspace:actionlint:check"]
run = "actionlint"

[tasks."workspace:repolish:check"]
run = "uv-toolbox exec --env repolish -- repolish apply --check"

[tasks."workspace:repolish:link"]
run = "uv-toolbox exec --env repolish -- repolish link"

[tasks."workspace:docs:dev"]
run = "zensical serve --dev-addr=127.0.0.1:8000"

[tasks."workspace:docs:build"]
run = "zensical build --clean"

[tasks."workspace:docs:clean"]
run = "rm -rf site/"

# --- devkit-python tasks ---
# Format down to 80 cols where it fits; ruff's formatter adds a magic
# trailing comma to anything it explodes across lines, and skip-magic-
# trailing-comma=false means that comma then forces the construct to stay
# exploded even once the width limit widens back out to the real 119-col
# config on the second pass. ruff check --fix applies COM812 (add missing
# trailing commas) to anything the formatter didn't already touch.
#
# COM812 is ignored in ruff.toml itself (it conflicts with the formatter,
# which warns on every `ruff format` invocation if it's enabled there) and
# re-enabled only for this one fix-only pass via --extend-select.
[tasks."python:format"]
usage = '''
arg "[files]" var=#true default="." help="Files to format (defaults to the whole tree; lefthook passes staged files here)"
'''
run = """
ruff format --line-length=80 ${usage_files}
ruff check --extend-select COM812 --fix --fix-only ${usage_files}
ruff format ${usage_files}
"""

[tasks."python:check:ruff"]
run = """
ruff check .
ruff format --check .
"""

[tasks."python:check:format"]
run = "ruff format --check ."

[tasks."python:check:ty"]
run = "ty check ."

[tasks."python:check:complexity"]
run = "complexipy -mx 10 ."

[tasks."python:check:pydoclint"]
# devkit dogfoods devkit-python locally (provider_root:, not an installed
# package), so there's no `.repolish/devkit-python` symlink to reference —
# point directly at the package's own config instead.
run = "pydoclint --style=google --config=./packages/devkit-python/devkit/python/resources/configs/pydoclint.toml ."

[tasks."python:check:coverage"]
# default="" is not usable here: mise's usage engine renders an empty-string
# default as the literal two-character string `''`, not a true empty value,
# which pytest then treats as a bogus "file or directory not found: ''"
# positional arg. A non-empty sentinel plus an explicit check works around it.
usage = '''
arg "[extra]" var=#true default="__NONE__" help="Extra pytest arguments, e.g. --ignore tests/action/"
'''
run = '''
if [ "${usage_extra}" = "__NONE__" ]; then
  pytest -v --tb=short --cov=devkit --cov-report=term-missing --cov-report=html:.coverage-files/htmlcov
else
  pytest -v --tb=short --cov=devkit --cov-report=term-missing --cov-report=html:.coverage-files/htmlcov ${usage_extra}
fi
'''

# --- devkit-releez tasks ---
[tasks."releez:changelog:regen"]
run = "mise exec -- releez changelog regenerate"

[tasks.format]
depends = ["python:format", "workspace:dprint:format"]

[tasks.setup]
depends = ["python:uv-sync", "workspace:pnpm-install"]
run = "echo Ready!"

[tasks.ci-checks]
depends = [
  "workspace:dprint:check",
  "python:check:ruff",
  "python:check:format",
  "python:check:ty",
  "python:check:complexity",
  "python:check:pydoclint",
  "python:check:coverage",
  "workspace:actionlint:check",
]

[tasks.repo-checks]
depends = [
  "workspace:dprint:check",
  "workspace:actionlint:check",
  "workspace:repolish:check",
]
