[settings]
experimental = true
python.uv_venv_auto = true

[env]
GITHUB_REPO_OWNER = "hotdog-werx"
GITHUB_REPO_NAME = "{{ config_root | basename }}"
GITHUB_REPO = "{{ env.GITHUB_REPO_OWNER }}/{{ env.GITHUB_REPO_NAME }}"
GIT_CLIFF_CONFIG = "./cliff.toml"

[tools]
uv = "0.11.26"
dprint = "0.55.1"
starship = "1.26.0"
git-cliff = "2.13.1"
actionlint = "1.7.11"
shellcheck = "0.11.0"

"pipx:uv-toolbox" = "0.1.0"
"pipx:ruff" = "0.14.14"
"pipx:ty" = "latest"
"pipx:tbelt" = "0.0.3"
"pipx:zensical" = "0.0.19"
"pipx:hotdog-werx/releez" = "0.2.0"

[hooks]
postinstall = ["mise run setup-hook"]

# --- devkit-workspace tasks ---
[tasks]
format-dprint.run = "uvx tbelt format dprint"
check-dprint.run = "uvx tbelt check dprint"
check-actionlint.run = "actionlint"
check-repolish.run = "repolish apply --check"
dev-docs.run = "zensical serve --dev-addr=127.0.0.1:8000"
build-docs.run = "zensical build --clean"
clean-docs.run = "rm -rf site/"

# --- devkit-python tasks ---
format-python.run = "uvx tbelt format python"
check-python.run = "uvx tbelt check python"
check-format.run = "uvx ruff format --check --config ruff.toml ."
check-ty.run = "uvx tbelt check ty"
check-complexity.run = "uvx tbelt check complexity"
check-pydoclint.run = "uvx tbelt check pydoclint"
check-coverage.run = "uvx tbelt check coverage"

# --- devkit-releez tasks ---
regen-changelog.run = "mise exec -- releez changelog regenerate"

[tasks.format]
depends = ["format-python", "format-dprint"]

[tasks.setup]
depends = ["uv-sync", "pnpm-install"]
run = "echo Ready!"

[tasks.ci-checks]
depends = [
  "check-dprint",
  "check-python",
  "check-format",
  "check-ty",
  "check-complexity",
  "check-pydoclint",
  "check-coverage",
  "check-actionlint",
]

[tasks.repo-checks]
depends = ["check-dprint", "check-actionlint", "check-repolish"]
