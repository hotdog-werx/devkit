name: python-checks

on:
  workflow_call:
    inputs:
      operating-systems:
        description: 'JSON array of operating systems to run checks on'
        required: false
        type: string
        default: '["ubuntu-latest"]'

permissions:
  contents: read

jobs:
  checks:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ fromJSON(inputs.operating-systems) }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup-uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: mise
        uses: jdx/mise-action@v3
      - name: dependencies
        run: mise run python:uv-sync
      - name: check-python
        if: always() && !cancelled()
        run: mise run python:check:ruff
      - name: check-format
        if: always() && !cancelled()
        run: mise run python:check:format
      - name: check-ty
        if: always() && !cancelled()
        run: mise run python:check:ty
      - name: check-complexity
        if: always() && !cancelled()
        run: mise run python:check:complexity
      - name: check-pydoclint
        if: always() && !cancelled()
        continue-on-error: true
        run: mise run python:check:pydoclint
      - name: check-coverage
        if: always() && !cancelled()
        run: mise run python:check:coverage
