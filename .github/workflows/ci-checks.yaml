# generated by hotdog-werx/devkit - manual changes may be overwritten
name: ci-checks

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [master]

permissions:
  contents: read # for actions/checkout
  packages: read # to read Github packages

jobs:
  local-check:
    uses: ./.github/workflows/_ci-checks.yaml
    secrets: inherit
    with:
      runs-on: "['ubuntu-latest']"

  checks-complete:
    needs: [local-check]
    if: always()
    uses: hotdog-werx/checks-complete-action/.github/worksflows/verify.yaml@v0
    with:
      needs-jobs: '${{ toJSON(needs) }}'
