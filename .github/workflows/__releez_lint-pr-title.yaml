name: releez-lint-pr-title

on:
  workflow_call:
    inputs:
      releez-action-ref:
        description: 'Ref for the hotdog-werx/releez action, e.g. hotdog-werx/releez@v1, or ./ to dogfood the current repo'
        type: string
        default: hotdog-werx/releez@v1

permissions:
  contents: read

jobs:
  lint-pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate commit message
        uses: ${{ inputs.releez-action-ref }}
        with:
          mode: validate-commit
          commit-message: ${{ github.event.pull_request.title }}
