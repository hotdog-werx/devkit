[project]
site_name = "hotdog-werx/devkit"
site_description = "Shared repolish providers, mise tasks, and CI workflows for hotdog-werx repos"
site_url = "https://hotdog-werx.github.io/devkit"
repo_url = "https://github.com/hotdog-werx/devkit"
repo_name = "hotdog-werx/devkit"

nav = [
  { "Home" = "index.md" },
  { "Architecture" = [{ "Providers" = "architecture/providers.md" }, { "Mise Tasks" = "architecture/mise-tasks.md" }, { "Repolish Mechanics" = "architecture/repolish-mechanics.md" }] },
  { "CI Workflows" = [{ "Reusable Workflows" = "ci/reusable-workflows.md" }] },
  { "Adopting Devkit" = "adopting-devkit.md" },
]

[project.theme]
language = "en"
features = [
  "announce.dismiss",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.top",
  "search.highlight",
]

[project.theme.icon]
tag.default = "lucide/hash"

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "orange"
toggle.icon = "lucide/moon-star"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/hotdog-werx"
