# Reference only — not yet auto-merged into consumer pyproject.toml. Copy
# into the consumer's own pyproject.toml.
#
# `extend` points at the whole-resources-directory symlink `repolish link`
# creates for every installed provider (populated on every `mise install`
# via the postinstall hook, no `repolish apply` required). A repo that
# dogfoods devkit-python locally (via `provider_root:` in its own
# repolish.yaml) instead of consuming it as a package won't get that
# symlink — point `extend` at the local package path instead, e.g.
# "./packages/devkit-python/devkit/python/resources/configs/ruff.toml".
[tool.ruff]
extend = ".repolish/devkit-python/configs/ruff.toml"

# per-file-ignores lives here, not in the shared ruff.toml: ruff's `extend`
# resolves relative globs (like "**/tests/*.py") against the *extended*
# file's own directory, not this project's root, so they'd never match
# anything if they lived in the shared config. Adjust paths/rules to this
# repo's actual layout as needed — this is a starting point, not gospel.
[tool.ruff.lint.per-file-ignores]
"**/tests/*.py" = [
  "ANN001", # Allow untyped fixture arguments
  "ANN201", # Allow tests to not have a return type
  "ARG001", # Ignore unused arguments in tests - sometimes required for fixtures
  "D101", # Allow test code to have public classes without docstrings
  "D102", # Allow test code to have public methods without docstrings
  "D103", # Allow test code to have public functions without docstrings
  "INP001", # Test dirs don't need __init__.py
  "PT004", # Allow none-returning fixtures to not lead with underscore due to ty conflict
  "S101", # Please sir may I use assert in my tests?
  "S701", # Jinja Environment() without autoescape is fine for non-HTML template tests
]

[tool.coverage.html]
directory = ".coverage-files/htmlcov"

[tool.coverage.report]
exclude_lines = [
  "pragma: no cover",
  "if __name__ == .__main__.:",
  "if typing.TYPE_CHECKING:",
  "\\.\\.\\.",
]
show_missing = true
