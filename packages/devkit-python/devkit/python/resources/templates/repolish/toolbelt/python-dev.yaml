profiles:
  ty:
    extensions: ['.py']
    format_tools: []
    check_tools:
      - name: ty
        command: uvx
        args:
          - ty@${TB_TY_VERSION:latest}
          - check
          - ${TB_TY_EXTRA_ARGS:}
        file_handling_mode: batch
        default_target: .
        description: ty type checker

  complexity:
    extensions: ['.py']
    format_tools: []
    check_tools:
      - name: complexity
        command: uvx
        args:
          - complexipy@${TB_COMPLEXIPY_VERSION:latest}
          - -mx
          - ${TB_COMPLEXIPY_THRESHOLD:10}
        file_handling_mode: batch
        default_target: .
        description: Python complexity checker

  coverage:
    extensions: ['.py']
    format_tools: []
    check_tools:
      - name: coverage
        description: Run tests with coverage
        command: pytest
        args:
          - -${TB_COVERAGE_VERBOSE:v}
          - --tb=short
          - --cov-config=${TB_COVERAGE_CONFIG:coveragerc.toml}
          - --cov=${TB_PROJECT_SOURCE:src}
          - --cov-report=term-missing
          - --cov-report=html:.coverage-files/htmlcov
          - ${TB_COVERAGE_EXTRA_ARGS:}
        file_handling_mode: batch
        default_target: ${TB_COVERAGE_TARGET:tests}

  pydoclint:
    extensions: ['.py']
    format_tools: []
    check_tools:
      - name: pydoclint
        command: uvx
        args:
          - pydoclint@${TB_PYDOCLINT_VERSION:latest}
          - --style=google
          - --config=${TB_PYDOCLINT_CONFIG:pydoclint.toml}
        file_handling_mode: batch
        default_target: .
        description: Google-style docstring/signature consistency checker (advisory - not yet CI-blocking)

variables:
  TB_COMPLEXIPY_VERSION: 4.0.2
  TB_TY_VERSION: latest
  TB_PYDOCLINT_VERSION: latest
