lint.external = ["CCR", "DAR", "DOC", "WPS"]

lint.select = ["ALL"]
lint.ignore = [
  "D100", # No docstrings for modules
  "D104", # No docstrings for packages
  "D107", # Allow __init__ to not have docstrings, conflicts with pydoclint
  "FIX", # Allow TODOs which are checked by TD rules
  "ISC001", # Allow implicit string concatenation. Sometimes it's just cleaner
  "PLR2004", # Allow magic value comparison
  "S607", # Allow subprocess calls to bare tool names (git, etc.) resolved via PATH
  "SLF", # Ignore private member access, covered by ty
]
line-length = 119
target-version = "py311"

[format]
quote-style = "single"
indent-style = "space"
skip-magic-trailing-comma = false

[lint.flake8-annotations]
allow-star-arg-any = true

[lint.flake8-quotes]
inline-quotes = "single"
multiline-quotes = "double"

[lint.isort]
split-on-trailing-comma = true

[lint.mccabe]
max-complexity = 7

[lint.per-file-ignores]
# NOTE: must be "**/tests/*.py" (not "tests/**.py") to match both root-level
# tests/*.py and nested packages/*/tests/*.py — the old pattern silently
# matched nothing, so none of these ignores were ever actually applied.
"**/tests/*.py" = [
  "ANN001", # Allow untyped fixture arguments
  "ANN201", # Allow tests to not have a return type
  "ARG001", # Ignore unused arguments in tests - sometimes required for fixtures
  "D101", # Allow test code to have public classes without docstrings
  "D102", # Allow test code to have public methods without docstrings
  "D103", # Allow test code to have public functions without docstrings
  "INP001", # Test dirs don't need __init__.py
  "PT004", # Allow none-returning fixtures to not lead with underscore due to ty conflict
  "S101", # Please sir may I use assert in my tests?
  "S701", # Jinja Environment() without autoescape is fine for non-HTML template tests
]

"**/resources/templates/repolish.py" = [
  "INP001", # This file is loaded by path (provider_root: self-dogfood), not as a package member
]

[lint.pydocstyle]
convention = "google"
