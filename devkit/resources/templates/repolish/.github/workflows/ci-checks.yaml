# generated by hotdog-werx/devkit - manual changes may be overwritten
name: ci-checks

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [master]

permissions:
  contents: read # for actions/checkout
  packages: read # to read Github packages

jobs:
{%- for item in cookiecutter.devkits | sort(attribute='name') %}
  {%- set devkit_repo = "devkit-" + item.name if item.name != "base" else "devkit" %}
  {{ item.name }}-check:
    uses: {% if item.name == 'local' %}./.github/workflows/_ci-checks.yaml{% else %}hotdog-werx/{{ devkit_repo }}/.github/workflows/_ci-checks.yaml@{{ item.ref }}{% endif %}
    secrets: inherit
    with:
      runs-on: "{{ item.runs_on }}"

{% endfor %}
  checks-complete:
    needs: [{% for item in cookiecutter.devkits | sort(attribute='name') %}{{ item.name }}-check, {% endfor %}]
    if: always()
    uses: hotdog-werx/checks-complete-action/.github/worksflows/verify.yaml@v0
    with:
      needs-jobs: '{% raw %}${{ toJSON(needs) }}{% endraw %}'
