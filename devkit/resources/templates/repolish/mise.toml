# generated by hotdog-werx/devkit - manual changes may be overwritten
[env]
GITHUB_REPO_OWNER = "{{ cookiecutter.owner }}"
GITHUB_REPO_NAME = "{% raw %}{{ config_root | basename }}{% endraw %}"
GITHUB_REPO = "{% raw %}{{ env.GITHUB_REPO_OWNER }}/{{ env.GITHUB_REPO_NAME }}{% endraw %}"
# GIT_CLIFF_CONFIG = "./.pkglink/.devkit-release/configs/cliff.toml"

[tasks]
pkglink.run = "mise exec -- pkglink sync"
setup-hook.run = "mise exec -- poe setup-hook"

[hooks]
postinstall = ["mise run pkglink", "mise run setup-hook"]

[tools]
uv = "0.9.26"
dprint = "0.50.1"
starship = "1.21.1"
# git-cliff = "2.11.0"
# actionlint = "1.7.10"
# shellcheck = "0.11.0"

## repolish-regex[poethepoet-version]: ^"pipx:poethepoet" =\s*(.+)$
"pipx:poethepoet" = "0.36.0"
## repolish-regex[tbelt-version]: ^"pipx:tbelt" =\s*(.+)$
"pipx:tbelt" = "0.0.3"
## repolish-regex[ruff-version]: ^"pipx:ruff" =\s*(.+)$
"pipx:ruff" = "0.12.3"
## repolish-regex[repolish-version]: (^"(pipx:hotdog-werx/repolish|pipx:repolish)" =\s*(.+)$)
"pipx:repolish" = "0.3.3"
## repolish-regex[pkglink-version]: (^"(pipx:hotdog-werx/pkglink|pipx:pkglink)" =\s*(.+)$)
"pipx:hotdog-werx/pkglink" = "fix/fix-local-caching"
## repolish-regex[releez-version]: (^"(pipx:hotdog-werx/releez|pipx:releez)" =\s*(.+)$)
"pipx:hotdog-werx/releez" = "topic/changelog-regen"

[settings]
experimental = true
python.uv_venv_auto = true
